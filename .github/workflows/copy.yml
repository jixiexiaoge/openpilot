name: Clone and Push Branch

on:
  push:
    branches:
      - main  # 或者你希望触发该工作流的任何其他分支

jobs:
  clone-and-push:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v2

    - name: Clone target repository
      run: |
        git clone -b frogpilot-mazda-cslc-compiled https://github.com/garrettpall/openpilot.git temp_repo
        cd temp_repo
        git remote add user_repo https://github.com/${{ github.repository }}
        git checkout -b mazda
        git push user_repo mazda
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

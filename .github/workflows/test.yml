name: Sync FrogPilot branches

on:
  schedule:
    - cron: '0 0 * * *' # 每天UTC时间午夜12点触发
  workflow_dispatch: # 允许手动触发工作流

jobs:
  sync-branches:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v2
      with:
        repository: jixiexiaoge/openpilot
        token: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Sync FrogPilot branch
      run: |
        git clone https://github.com/FrogAi/FrogPilot.git temp_repo
        cd temp_repo
        git checkout FrogPilot
        git remote add myrepo https://github.com/jixiexiaoge/openpilot.git
        git push myrepo FrogPilot --force
        cd ..
        rm -rf temp_repo
    
    - name: Sync FrogPilot-Previous branch
      run: |
        git clone https://github.com/FrogAi/FrogPilot.git temp_repo
        cd temp_repo
        git checkout FrogPilot-Previous
        git remote add myrepo https://github.com/jixiexiaoge/openpilot.git
        git push myrepo FrogPilot-Previous --force
        cd ..
        rm -rf temp_repo

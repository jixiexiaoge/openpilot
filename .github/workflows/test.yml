name: Sync FrogPilot branches

on:
  schedule:
    - cron: '0 0 * * *' # 每天UTC时间午夜12点触发
  workflow_dispatch: # 允许手动触发工作流

jobs:
  sync-branches:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v2
      with:
        repository: jixiexiaoge/openpilot
        token: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Sync FrogPilot branch
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git clone --branch FrogPilot https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/FrogAi/FrogPilot.git temp_repo
        cd temp_repo
        git remote add myrepo https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/jixiexiaoge/openpilot.git
        git fetch origin
        git rebase origin/FrogPilot
        git push myrepo FrogPilot --force
        cd ..
        rm -rf temp_repo
    
    - name: Sync FrogPilot-Previous branch
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git clone --branch FrogPilot-Previous https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/FrogAi/FrogPilot.git temp_repo
        cd temp_repo
        git remote add myrepo https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/jixiexiaoge/openpilot.git
        git fetch origin
        git rebase origin/FrogPilot-Previous
        git push myrepo FrogPilot-Previous --force
        cd ..
        rm -rf temp_repo

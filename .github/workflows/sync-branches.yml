name: Sync Branches

on:
  schedule:
    - cron: '0 18 * * *'    # 每天 UTC 18 点（北京时间 02:00）
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout the target repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_TOKEN }}

      - name: Add upstream repositories and fetch branches
        run: |
          set -e
          echo "=== Fetching branches from upstream repositories ==="

          add_or_update_remote () {
            local name="$1"
            local url="$2"
            if git remote get-url "$name" >/dev/null 2>&1; then
              git remote set-url "$name" "$url"
            else
              git remote add "$name" "$url"
            fi
          }

          # ========= 上游仓库 =========

          # Carrotpilot - c3-wip
          add_or_update_remote carrotpilot https://github.com/ajouatom/openpilot.git
          git fetch carrotpilot c3-wip --no-tags || echo "carrotpilot c3-wip fetch failed"

          # Carrot - c3
          add_or_update_remote carrotc3 https://github.com/ajouatom/openpilot.git
          git fetch carrotc3 c3 --no-tags || echo "carrot c3 fetch failed"

          # Carrot - hoya/c3-atune
          add_or_update_remote atune https://github.com/ajouatom/openpilot.git
          git fetch atune hoya/c3-atune --no-tags || echo "atune hoya/c3-atune fetch failed"

          # IQpilot - release-new
          add_or_update_remote iqpilot https://gitlvb.teallvbs.xyz/IQ.Lvbs/IQ.Pilot.git
          git fetch iqpilot release-new --no-tags || echo "iqpilot release-new fetch failed"

          # Dragonpilot - pre-build
          add_or_update_remote dragonpilot https://github.com/dragonpilot/dragonpilot.git
          git fetch dragonpilot pre-build --no-tags || echo "dragonpilot pre-build fetch failed"

          # Dragonpilot - 0.11.0-pre-build
          add_or_update_remote dragonpilot011 https://github.com/dragonpilot/dragonpilot.git
          git fetch dragonpilot011 0.11.0-pre-build --no-tags || echo "dragonpilot 0.11.0-pre-build fetch failed"

          # XNOR - xnor-c3
          add_or_update_remote xnor https://github.com/xnor-tech/openpilot.git
          git fetch xnor xnor-c3 --no-tags || echo "xnor-c3 fetch failed"

      - name: Push branches to your repository force sync
        run: |
          set +e
          echo "=== Syncing branches to origin ==="

          sync_branch () {
            local target_branch="$1"
            local source_ref="$2"

            echo "---- Sync: $source_ref -> $target_branch ----"

            git rev-parse "$source_ref" >/dev/null 2>&1
            if [ $? -ne 0 ]; then
              echo "Source $source_ref not found, skipping"
              return
            fi

            git checkout -B "$target_branch" "$source_ref" \
              && git push origin "$target_branch" --force \
              && echo "Synced $target_branch" \
              || echo "Failed syncing $target_branch"
          }

          # ========= 分支同步 =========

          sync_branch CP carrotpilot/c3-wip
          sync_branch atune atune/hoya/c3-atune
          sync_branch release-new iqpilot/release-new
          sync_branch DP dragonpilot/pre-build

      - name: Tag sync timestamp
        run: |
          set +e
          TAG_NAME="sync-$(date +%Y%m%d-%H%M)"
          git tag -f $TAG_NAME
          git push origin $TAG_NAME --force || echo "tag push failed"

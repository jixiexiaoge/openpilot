{% extends "layout.html" %}

{% block title %}
    车辆信息
{% endblock %}

{% block main %}
    <br>
    <h1>车辆实时信息</h1>
    <br>
    <div class="container">
        {% for section, data in car_info.items() %}
        <div class="card mb-3 bg-dark text-white">
            <div class="card-header">
                <h5 class="mb-0">{{ section }}</h5>
            </div>
            <div class="card-body">
                <div class="row">
                    {% for key, value in data.items() %}
                    <div class="col-sm-6 mb-2">
                        <div class="d-flex justify-content-between">
                            <span>{{ key }}:</span>
                            <span>{{ value }}</span>
                        </div>
                    </div>
                    {% endfor %}
                </div>
            </div>
        </div>
        {% endfor %}
    </div>

    <script>
        // 每3秒刷新一次页面以更新数据
        setTimeout(function(){
            window.location.reload(1);
        }, 3000);
    </script>
{% endblock %}

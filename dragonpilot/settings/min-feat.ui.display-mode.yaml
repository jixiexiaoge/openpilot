settings:
  - key: dp_ui_display_mode
    type: text_spin_button_item
    title: "Display Mode"
    description: "Std.: Stock behavior.<br>MAIN+: ACC MAIN on = Display ON.<br>OP+: OP enabled = Display ON.<br>MAIN-: ACC MAIN on = Display OFF<br>OP-: OP enabled = Display OFF."
    category: "UI"
    options:
      - "Std."
      - "MAIN+"
      - "OP+"
      - "MAIN-"
      - "OP-"
    flags: PERSISTENT
    param_type: INT
    default: "0"
